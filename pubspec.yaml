name: tapgo_terminal_plugin
description: Flutter plugin wrapper for TapGo Android terminal hardware SDKs.
version: 0.1.0
homepage: https://github.com/your-org/tapgo_terminal_plugin
repository: https://github.com/your-org/tapgo_terminal_plugin
issue_tracker: https://github.com/your-org/tapgo_terminal_plugin/issues

environment:
  sdk: ^3.5.4
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.tapgo.tapgo_terminal_plugin
        pluginClass: TapgoTerminalPlugin
